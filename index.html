<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロフ帳 ★ My Profile</title>

<style>
@font-face {
  font-family: 'MPLUS1c';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('fonts/m-plus-rounded-1c-v20-latin-regular.woff2') format('woff2');
}
@font-face {
  font-family: 'MPLUS1c';
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url('fonts/m-plus-rounded-1c-v20-latin-700.woff2') format('woff2');
}
@font-face {
  font-family: 'MPLUS1c';
  font-weight: 800;
  font-style: normal;
  font-display: swap;
  src: url('fonts/m-plus-rounded-1c-v20-latin-800.woff2') format('woff2');
}
@font-face {
  font-family: 'MPLUS1c';
  font-weight: 900;
  font-style: normal;
  font-display: swap;
  src: url('fonts/m-plus-rounded-1c-v20-latin-900.woff2') format('woff2');
}
@font-face {
  font-family: 'ZenMaru';
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url('fonts/zen-maru-gothic-v19-latin-700.woff2') format('woff2');
}
@font-face {
  font-family: 'NotoEmoji';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('fonts/noto-color-emoji-v39-emoji-regular.woff2') format('woff2');
}

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg1: #ffb6d9;
  --bg2: #dda0f8;
  --bg3: #a0c8ff;
  --bg4: #ffd6a0;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 30%, var(--bg3) 65%, var(--bg4) 100%);
  font-family: 'MPLUS1c', 'NotoEmoji', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 16px 70px;
  position: relative;
  overflow-x: hidden;
}

/* 背景装飾シンボル（absolute に変更・Mac Chrome 黒画面バグ回避） */
.bg-symbol {
  position: absolute;
  font-size: 180px;
  line-height: 1;
  opacity: 0.18;
  pointer-events: none;
  font-family: serif;
  font-weight: 900;
  color: rgba(255,255,255,0.5);
  z-index: 0;
}
.bg-symbol-2 {
  position: absolute;
  font-size: 110px;
  opacity: 0.2;
  pointer-events: none;
  color: rgba(255,255,255,0.5);
  z-index: 0;
}
@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.float-bg {
  position: absolute;
  pointer-events: none;
  animation: floaty 7s ease-in-out infinite;
  will-change: transform;
  z-index: 0;
  font-size: 20px;
  opacity: 0.3;
}
@keyframes floaty {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-16px) rotate(5deg); }
}

.page-title {
  font-size: 30px;
  font-weight: 900;
  color: white;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 5px;
  text-shadow: 2px 2px 0 rgba(200,50,120,0.4), 0 0 20px rgba(255,255,255,0.6);
  position: relative; z-index: 1;
}
.page-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  text-align: center;
  letter-spacing: 6px;
  margin-bottom: 26px;
  position: relative; z-index: 1;
}

/* ─── 入力カード ─── */
.card {
  background: rgba(255,255,255,0.93);
  border: 1.5px solid rgba(255,255,255,0.9);
  border-radius: 24px;
  padding: 28px 26px 34px;
  width: 100%;
  max-width: 520px;
  position: relative;
  z-index: 1;
  box-shadow: 0 8px 32px rgba(200,80,140,0.18);
}

.form-section { display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }

.field-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 800;
  color: #8a2060;
  letter-spacing: 2px;
}

.field-input {
  background: #fff;
  border: 1.5px solid rgba(240,140,190,0.8);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: 'MPLUS1c', 'NotoEmoji', sans-serif;
  color: #4a1030;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}
.field-input:focus {
  border-color: #e91e8c;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(233,30,140,0.15);
}
.field-input::placeholder { color: rgba(180,80,120,0.45); font-size: 12px; }
textarea.field-input { resize: vertical; min-height: 78px; line-height: 1.6; }

/* 血液型セレクト */
.blood-row {
  display: flex;
  gap: 8px;
}
.blood-btn {
  flex: 1;
  padding: 9px 4px;
  border: 1.5px solid rgba(240,140,190,0.7);
  border-radius: 12px;
  background: #fff;
  font-family: 'MPLUS1c', 'NotoEmoji', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: #b05080;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.blood-btn:hover {
  border-color: #e91e8c;
  background: #fff0f6;
}
.blood-btn.selected {
  background: linear-gradient(135deg, #f48fb1, #ce93d8);
  border-color: transparent;
  color: white;
  box-shadow: 0 3px 10px rgba(200,80,160,0.3);
}
.blood-hint { font-size: 10px; color: rgba(120,40,80,0.6); margin-top: 2px; }

/* 誕生日 */
.bday-row { display: flex; align-items: center; gap: 5px; }
.bday-inp {
  background: #fff;
  border: 1.5px solid rgba(240,140,190,0.8);
  border-radius: 12px;
  padding: 10px 6px;
  font-size: 15px;
  font-family: 'MPLUS1c', 'NotoEmoji', sans-serif;
  color: #4a1030;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  text-align: center;
  -webkit-appearance: none;
}
.bday-inp:focus {
  border-color: #e91e8c;
  box-shadow: 0 0 0 3px rgba(233,30,140,0.15);
}
.bday-inp::placeholder { color: rgba(180,80,120,0.45); font-size: 11px; }
#f-bday-y { width: 76px; }
#f-bday-m { width: 52px; }
#f-bday-d { width: 52px; }
.bday-sep { font-size: 15px; color: #c05080; font-weight: 800; flex-shrink: 0; }
.bday-hint { font-size: 10px; color: rgba(120,40,80,0.6); margin-top: 3px; line-height: 1.5; }

.divider {
  display: flex; align-items: center; gap: 10px;
  color: rgba(200,80,140,0.7); font-size: 13px; margin: 6px 0 2px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, rgba(240,140,180,0.5));
}
.divider::after { background: linear-gradient(to left, transparent, rgba(240,140,180,0.5)); }

.btn-generate {
  margin-top: 22px; width: 100%; padding: 15px;
  background: linear-gradient(135deg, #f06292, #ce93d8, #80b4f8);
  color: white; border: none; border-radius: 50px;
  font-family: 'MPLUS1c', 'NotoEmoji', sans-serif;
  font-size: 16px; font-weight: 900; letter-spacing: 3px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 0 rgba(180,50,120,0.4), 0 8px 20px rgba(200,80,180,0.3);
}
.btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(180,50,120,0.4), 0 12px 28px rgba(200,80,180,0.4); }
.btn-generate:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(180,50,120,0.4); }

/* ═══ OUTPUT ═══ */
#output-section {
  display: none; width: 100%; max-width: 520px; margin-top: 32px;
  position: relative; z-index: 1;
}

.output-card {
  border-radius: 24px;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.6);
  font-family: 'MPLUS1c', 'NotoEmoji', sans-serif;
  box-shadow: 0 12px 40px rgba(180,60,140,0.25);
  position: relative;
}

.output-header {
  padding: 22px 24px 18px;
  position: relative;
  overflow: hidden;
  min-height: 180px;
}

/* 血液型バッジ（ヘッダー右上） */
.blood-badge-big {
  position: absolute;
  top: 14px; right: 18px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.28);
  border: 2px solid rgba(255,255,255,0.7);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: white; font-weight: 900;
  z-index: 3;
}
.blood-badge-big .blood-type-text {
  font-size: 18px; line-height: 1; letter-spacing: 0;
}
.blood-badge-big .blood-label {
  font-size: 8px; letter-spacing: 1px; opacity: 0.85;
}

.hdr-symbol-big {
  position: absolute;
  right: 0px; bottom: -10px;
  font-size: 140px;
  line-height: 1;
  color: rgba(255,255,255,0.18);
  font-family: serif;
  font-weight: 900;
  pointer-events: none;
  user-select: none;
}
.hdr-symbol-small {
  position: absolute;
  left: 12px; bottom: 14px;
  font-size: 56px;
  line-height: 1;
  opacity: 0.25;
  font-family: serif;
  pointer-events: none;
  user-select: none;
}
.hdr-gem-deco {
  position: absolute;
  font-size: 28px;
  pointer-events: none;
  animation: gem-float 4s ease-in-out infinite;
  will-change: transform;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}
@keyframes gem-float {
  0%,100% { transform: translateY(0) rotate(-8deg); }
  50%      { transform: translateY(-8px) rotate(8deg); }
}

.hdr-ticker {
  font-size: 10px; color: rgba(255,255,255,0.8);
  letter-spacing: 5px; margin-bottom: 12px;
}
.output-title {
  font-size: 20px; font-weight: 700; color: white;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.18);
  letter-spacing: 3px; margin-bottom: 12px;
  position: relative; z-index: 2;
}
.zodiac-row {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  position: relative; z-index: 2;
}
.zodiac-badge {
  background: rgba(255,255,255,0.28);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px; color: white; font-weight: 700;
  letter-spacing: 0.5px; white-space: nowrap;
}
.zodiac-badge.gem-badge {
  background: rgba(255,255,255,0.38);
  border-color: rgba(255,255,255,0.8);
  font-size: 13px;
}
.hdr-ticker-bot {
  font-size: 10px; color: rgba(255,255,255,0.8);
  letter-spacing: 5px; position: relative; z-index: 2;
}

/* ── ボディ ── */
.output-body {
  background: #fff;
  padding: 22px 22px 24px;
  position: relative;
}

.body-pattern {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden; z-index: 0;
  opacity: 0.055;
  font-size: 28px;
  display: flex; flex-wrap: wrap; align-content: flex-start;
  gap: 18px; padding: 10px;
}

.out-name-block {
  text-align: center;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1.5px dashed rgba(200,100,150,0.35);
  position: relative; z-index: 1;
}
.out-name {
  font-size: 28px; font-weight: 700; color: #a01860;
  letter-spacing: 4px;
  text-shadow: 0 1px 3px rgba(200,80,140,0.2);
}
.out-bday { font-size: 12px; color: #b05080; margin-top: 4px; letter-spacing: 2px; }

/* 血液型 + 誕生日の横並びブロック */
.out-meta-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.out-blood-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 800;
  border: 1.5px solid;
}

.out-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 12px; position: relative; z-index: 1;
}
.out-item {
  background: #fff5f9;
  border: 1px solid rgba(240,160,200,0.6);
  border-radius: 14px;
  padding: 10px 12px;
}
.out-item.full { grid-column: 1 / -1; }
.out-key {
  font-size: 9px; font-weight: 800; color: #c04880;
  letter-spacing: 2px; margin-bottom: 5px;
  text-transform: uppercase;
}
.out-val { font-size: 14px; color: #2a0820; line-height: 1.5; word-break: break-all; }

.out-message-box {
  border: 1.5px solid rgba(200,140,200,0.5);
  border-radius: 16px;
  padding: 14px 16px; margin-top: 4px;
  background: #fdf5ff;
  position: relative; z-index: 1;
}
.out-message-label {
  font-size: 10px; font-weight: 800; color: #b040a0;
  letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase;
}
.out-message-text { font-size: 13px; color: #2a0820; line-height: 1.8; white-space: pre-wrap; }

.output-footer {
  padding: 12px 22px; text-align: center;
  font-size: 11px; letter-spacing: 4px;
  border-top: 1px dashed rgba(255,255,255,0.4);
  color: white;
  position: relative; z-index: 2;
}

.btn-download {
  display: block; margin: 20px auto 0; width: 100%;
  padding: 13px;
  background: #fff;
  color: #b03070;
  border: 2px solid rgba(240,140,190,0.6);
  border-radius: 50px;
  font-family: 'MPLUS1c', 'NotoEmoji', sans-serif;
  font-size: 14px; font-weight: 800; letter-spacing: 2px;
  cursor: pointer; transition: all 0.15s;
  box-shadow: 0 4px 16px rgba(200,80,140,0.15);
}
.btn-download:hover { background: #fff0f6; transform: translateY(-1px); }

.btn-tweet {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin: 10px auto 0; width: 100%; padding: 13px;
  background: #111; color: #fff;
  border: none; border-radius: 50px;
  font-family: 'MPLUS1c', 'NotoEmoji', sans-serif;
  font-size: 14px; font-weight: 800; letter-spacing: 2px;
  cursor: pointer; transition: background 0.15s, transform 0.15s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.btn-tweet:hover { background: #333; transform: translateY(-1px); }
.btn-tweet:disabled { opacity: 0.6; cursor: wait; transform: none; }
.btn-tweet svg { flex-shrink: 0; }

/* トースト */
.copy-toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(20,20,20,0.92); color: white;
  padding: 12px 24px; border-radius: 50px;
  font-family: 'MPLUS1c', 'NotoEmoji', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 9999; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── サイトフッター ─── */
.site-footer {
  position: relative; z-index: 1;
  margin-top: 40px;
  width: 100%; max-width: 520px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.site-footer-deco {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 5px;
}
.site-footer-copy {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 50px;
  padding: 7px 20px;
  color: white;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
}
.site-footer-copy .copy-sym {
  font-size: 13px;
  opacity: 0.85;
}
.site-footer-copy .copy-year {
  opacity: 0.7;
  font-weight: 400;
}
.site-footer-copy .copy-name {
  font-weight: 800;
  letter-spacing: 1px;
}

@keyframes twinkle {
  from { opacity: 0.4; transform: scale(0.85) rotate(-8deg); }
  to   { opacity: 1;   transform: scale(1.15) rotate(8deg); }
}
</style>
</head>
<body>

<div id="copy-toast" class="copy-toast"></div>

<!-- 背景浮遊絵文字（パフォーマンス最適化: 5個に削減） -->
<div class="float-bg" style="top:8%;left:4%;animation-delay:0s;">🌸</div>
<div class="float-bg" style="top:25%;right:4%;animation-delay:1s;font-size:16px;">💖</div>
<div class="float-bg" style="top:48%;left:3%;animation-delay:2s;font-size:18px;">🌟</div>
<div class="float-bg" style="top:68%;right:5%;animation-delay:1.5s;font-size:16px;">🌷</div>
<div class="float-bg" style="top:88%;left:6%;animation-delay:0.8s;font-size:15px;">✨</div>

<div class="bg-symbol" id="bg-sym-main" style="top:5%;left:-2%;">♡</div>
<div class="bg-symbol-2" id="bg-sym-sub" style="bottom:10%;right:5%;">★</div>

<div class="page-title">✦ My Profile ✦</div>
<div class="page-sub">💕 プロフ帳 💕</div>

<div class="card">
  <div class="form-section">

    <div class="divider">🌸 BASIC 🌸</div>

    <div class="field">
      <div class="field-label">✏️ 名前</div>
      <input class="field-input" id="f-name" type="text" placeholder="例：田中 さくら" maxlength="20">
    </div>

    <div class="field">
      <div class="field-label">🎂 誕生日</div>
      <div class="bday-row">
        <input class="bday-inp" id="f-bday-y" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="西暦" maxlength="4">
        <span class="bday-sep">年</span>
        <input class="bday-inp" id="f-bday-m" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="月" maxlength="2">
        <span class="bday-sep">月</span>
        <input class="bday-inp" id="f-bday-d" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="日" maxlength="2">
        <span class="bday-sep">日</span>
      </div>
      <div class="bday-hint">🔒 西暦は星座・干支・宝石・花の算出のみ。プロフには表示されません</div>
    </div>

    <div class="field">
      <div class="field-label">🩸 血液型</div>
      <div class="blood-row" id="blood-row">
        <button type="button" class="blood-btn" data-type="A"  onclick="selectBlood('A')">A型</button>
        <button type="button" class="blood-btn" data-type="B"  onclick="selectBlood('B')">B型</button>
        <button type="button" class="blood-btn" data-type="O"  onclick="selectBlood('O')">O型</button>
        <button type="button" class="blood-btn" data-type="AB" onclick="selectBlood('AB')">AB型</button>
      </div>
    </div>

    <div class="field">
      <div class="field-label">🎨 好きな色</div>
      <input class="field-input" id="f-color" type="text" placeholder="例：くすみピンク、ラベンダー" maxlength="30">
    </div>

    <div class="divider">💖 FAVORITE 💖</div>

    <div class="field">
      <div class="field-label">🍓 好きな食べ物</div>
      <input class="field-input" id="f-food" type="text" placeholder="例：いちごのショートケーキ" maxlength="40">
    </div>

    <div class="field">
      <div class="field-label">🎵 趣味</div>
      <input class="field-input" id="f-hobby" type="text" placeholder="例：カラオケ、プリクラ" maxlength="50">
    </div>

    <div class="field">
      <div class="field-label">💘 推し</div>
      <input class="field-input" id="f-oshi" type="text" placeholder="例：○○くん（○○グループ）" maxlength="50">
    </div>

    <div class="divider">🌟 ABOUT ME 🌟</div>

    <div class="field">
      <div class="field-label">💭 性格（ひとこと）</div>
      <input class="field-input" id="f-character" type="text" placeholder="例：天然ボケって言われる笑" maxlength="40">
    </div>

    <div class="field">
      <div class="field-label">🌈 将来の夢</div>
      <input class="field-input" id="f-dream" type="text" placeholder="例：パティシエになりたい！" maxlength="50">
    </div>

    <div class="field">
      <div class="field-label">💕 理想のタイプ</div>
      <input class="field-input" id="f-type" type="text" placeholder="例：笑顔がかわいい人♥" maxlength="50">
    </div>

    <div class="field">
      <div class="field-label">✉️ みんなへのメッセージ</div>
      <textarea class="field-input" id="f-msg" placeholder="ひとことどうぞ♪" maxlength="200"></textarea>
    </div>

    <button class="btn-generate" onclick="generate()">🌸 プロフ帳を作る 🌸</button>
  </div>

// ── グラデーション合成 ────────────────────────────────────────
function hex2rgba(hex, a) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function makeHeaderGrad(z, e, gem, fl, blood) {
  // 血液型カラーをアクセントに加える
  var bColor = blood ? BLOOD_THEME[blood].light : fl.sub;
  return 'linear-gradient(135deg, ' +
    z.grad[0] + ' 0%, ' + gem.light + ' 25%, ' +
    e.c + ' 52%, ' + bColor + ' 75%, ' + fl.sub + ' 100%)';
}
function makeBodyGrad(z, gem, blood) {
  var bLight = blood ? BLOOD_THEME[blood].light : gem.light;
  return 'linear-gradient(160deg, #fff 0%, ' +
    hex2rgba(bLight, 0.18) + ' 50%, ' +
    hex2rgba(z.grad[3], 0.22) + ' 100%)';
}
function makeBgGrad(z, e, gem, fl) {
  return 'linear-gradient(135deg, ' +
    hex2rgba(z.grad[0], 0.85) + ' 0%, ' +
    hex2rgba(gem.light, 0.9)  + ' 30%, ' +
    hex2rgba(e.c, 0.85)       + ' 60%, ' +
    hex2rgba(fl.sub, 0.9)     + ' 100%)';
}

// ── ボディパターン ────────────────────────────────────────────
function buildBodyPattern(z, gem, fl) {
  var emojis = [fl.emoji, gem.emoji, z.emoji, '✨', '💕', fl.emoji, '⭐', gem.emoji];
  var pat = document.getElementById('body-pattern');
  pat.innerHTML = '';
  for (var i = 0; i < 24; i++) pat.innerHTML += emojis[i%emojis.length] + ' ';
}

  hdr.innerHTML = [
    '<div class="hdr-symbol-big">'+z.sym+'</div>',
    '<div class="hdr-symbol-small">'+e.emoji+'</div>',
    blood ? '<div class="blood-badge-big"><div class="blood-type-text">'+blood+'</div><div class="blood-label">型</div></div>' : '',
    '<div class="hdr-gem-deco" style="top:14px;right:'+(blood?'78':'18')+'px;animation-delay:0.5s;">'+fl.emoji+'</div>',
    '<div class="hdr-gem-deco" style="top:10px;right:'+(blood?'118':'58')+'px;font-size:22px;animation-delay:1.2s;">'+gem.emoji+'</div>',
    '<div class="hdr-gem-deco" style="bottom:28px;right:110px;font-size:18px;animation-delay:0.8s;">'+z.emoji+'</div>',
    '<div class="hdr-ticker">💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕</div>',
    '<div class="output-title">'+name+' の プロフ 💖</div>',
    '<div class="zodiac-row" id="zodiac-row"></div>',
    '<div class="hdr-ticker-bot">💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕</div>',
  ].join('');

  var badges = [
    z.emoji + '  ' + z.name + '  ' + z.sym,
    e.emoji + '  ' + e.name,
    gem.emoji + '  ' + gem.name,
    fl.emoji + '  ' + fl.name,
    combo,
  ];
  if (blood) badges.splice(2, 0, BLOOD_THEME[blood].emoji + '  ' + blood + '型');
  var row = hdr.querySelector('#zodiac-row');
  badges.forEach(function(txt, i) {
    var b = document.createElement('div');
    b.className = 'zodiac-badge' + (i >= 2 ? ' gem-badge' : '');
    b.textContent = txt;
    row.appendChild(b);
  });
}

// ── メイン生成関数 ────────────────────────────────────────────
function v(id) { return document.getElementById(id).value.trim(); }

function generate() {
  var name = v('f-name');
  if (!name) { alert('名前を入力してね♪'); return; }

  var ys = v('f-bday-y'), ms = v('f-bday-m'), ds = v('f-bday-d');
  var hasBday = ys && ms && ds;
  var year = parseInt(ys,10), month = parseInt(ms,10), day = parseInt(ds,10);

  if (hasBday) {
    if (isNaN(year)||year<1900||year>2030) { alert('西暦を4桁で入力してね（例：2002）'); return; }
    if (isNaN(month)||month<1||month>12)   { alert('月を正しく入力してね（1〜12）'); return; }
    if (isNaN(day)||day<1||day>31)         { alert('日を正しく入力してね（1〜31）'); return; }
  }

  var card = document.getElementById('output-card');
  var blood = selectedBlood || null;

  if (hasBday) {
    var z = getZodiac(month, day);
    var e = getEto(year);
    var gem = getGem(month);
    var fl  = getFlower(month);
    var zIdx = ZODIAC.indexOf(z);
    var eIdx = ETO.indexOf(e);
    var combo = getComboMsg(zIdx, eIdx);

    document.body.style.background = makeBgGrad(z, e, gem, fl);
    document.getElementById('bg-sym-main').textContent = z.sym;
    document.getElementById('bg-sym-sub').textContent  = e.emoji;

    buildHeader(name, z, e, gem, fl, combo, blood);

    document.getElementById('out-body').style.background = makeBodyGrad(z, gem, blood);
    buildBodyPattern(z, gem, fl);

    // メッセージボックス
    var bLight = blood ? BLOOD_THEME[blood].light : gem.light;
    document.getElementById('out-msgbox').style.background =
      'linear-gradient(135deg, ' + hex2rgba(fl.sub,0.45) + ', ' + hex2rgba(bLight,0.45) + ')';
    document.getElementById('out-msgbox').style.borderColor = hex2rgba(gem.color, 0.3);

    card.style.borderColor = hex2rgba(z.grad[0], 0.7);
    card.style.boxShadow = '0 12px 40px ' + hex2rgba(z.grad[2], 0.3) + ', 0 4px 16px ' + hex2rgba(gem.color, 0.2);

    var footer = document.getElementById('out-footer');
    footer.style.background = 'linear-gradient(135deg,' + hex2rgba(z.grad[0],0.9) + ',' + hex2rgba(fl.sub,0.9) + ')';
    footer.style.color = 'white';
    footer.textContent = fl.emoji+' '+gem.emoji+' '+z.emoji+' '+e.emoji+' '+z.sym+' 💖 '+z.sym+' '+e.emoji+' '+z.emoji+' '+gem.emoji+' '+fl.emoji;

  } else {
    document.body.style.background = 'linear-gradient(135deg,#ffb6d9,#dda0f8,#a0c8ff,#ffd6a0)';
    var hdr = document.getElementById('out-header');
    hdr.innerHTML = [
      blood ? '<div class="blood-badge-big"><div class="blood-type-text">'+blood+'</div><div class="blood-label">型</div></div>' : '',
      '<div class="hdr-ticker">💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕</div>',
      '<div class="output-title">'+name+' の プロフ 💖</div>',
      '<div class="hdr-ticker-bot">💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕</div>',
    ].join('');
    hdr.style.background = 'linear-gradient(135deg,#f48fb1,#ce93d8,#90caf9)';
    document.getElementById('out-body').style.background = '#fff';
    card.style.borderColor = 'rgba(255,180,210,0.7)';
    card.style.boxShadow = '0 12px 40px rgba(200,80,160,0.2)';
    var fp = document.getElementById('out-footer');
    fp.style.background = 'linear-gradient(135deg,#fce4ef,#ede7f6)';
    fp.style.color = '#c07090';
    fp.textContent = '💖 ★ 💖 ★ 💖 ★ 💖 ★ 💖 ★ 💖';
    document.getElementById('body-pattern').innerHTML = '🌸 💕 ⭐ 🌷 ✨ 💖 🌸 💕 ⭐ 🌷 ✨ 💖 🌸 💕 ⭐ 🌷 ✨ 💖 🌸 💕 ⭐ 🌷 ✨ 💖 ';
  }

  // 名前・誕生日
  document.getElementById('out-name').textContent = name;
  document.getElementById('out-bday').textContent =
    hasBday ? '🎂 ' + month + '月' + day + '日 生まれ' : '';

  // 血液型バッジ（ボディ内）
  var metaRow = document.getElementById('out-meta-row');
  var existingBlood = metaRow.querySelector('.out-blood-badge');
  if (existingBlood) existingBlood.remove();
  if (blood) {
    var bt = BLOOD_THEME[blood];
    var bb = document.createElement('div');
    bb.className = 'out-blood-badge';
    bb.style.background = hex2rgba(bt.light, 0.7);
    bb.style.borderColor = hex2rgba(bt.color, 0.5);
    bb.style.color = bt.color;
    bb.textContent = bt.emoji + ' ' + blood + '型・' + bt.label;
    metaRow.appendChild(bb);
  }

  // グリッド
  var fields = [
    { key:'🎨 好きな色',    val: v('f-color'),     full: false },
    { key:'🍓 好きな食べ物', val: v('f-food'),      full: false },
    { key:'🎵 趣味',         val: v('f-hobby'),     full: false },
    { key:'💘 推し',         val: v('f-oshi'),      full: false },
    { key:'💭 性格',         val: v('f-character'), full: false },
    { key:'🌈 将来の夢',     val: v('f-dream'),     full: false },
    { key:'💕 理想のタイプ', val: v('f-type'),      full: true  },
  ];
  var grid = document.getElementById('out-grid');
  grid.innerHTML = '';
  fields.forEach(function(f) {
    var item = document.createElement('div');
    item.className = 'out-item' + (f.full ? ' full' : '');
    var key = document.createElement('div'); key.className = 'out-key'; key.textContent = f.key;
    var val = document.createElement('div'); val.className = 'out-val'; val.textContent = f.val || '—';
    item.appendChild(key); item.appendChild(val);
    grid.appendChild(item);
  });

  document.getElementById('out-msg').textContent = v('f-msg') || 'よろしくね♪';
  document.getElementById('out-msgbox').style.display = 'block';

  // Xポスト用データ
  window._postData = {
    name: name, blood: blood,
    bday: hasBday ? (month+'月'+day+'日') : null,
    zodiac: hasBday ? getZodiac(month,day) : null,
    eto:    hasBday ? getEto(year) : null,
    gem:    hasBday ? getGem(month) : null,
    flower: hasBday ? getFlower(month) : null,
    combo:  hasBday ? getComboMsg(ZODIAC.indexOf(getZodiac(month,day)), ETO.indexOf(getEto(year))) : null,
  };

  document.getElementById('output-section').style.display = 'block';
  setTimeout(function() {
    document.getElementById('output-section').scrollIntoView({ behavior:'smooth', block:'start' });
  }, 60);
}

// ── トースト ──────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('copy-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}

// ── Xポスト ───────────────────────────────────────────────────
var X_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>';

function resetTweetBtn() {
  var btn = document.getElementById('btn-tweet');
  btn.disabled = false;
  btn.innerHTML = X_SVG + ' 𝕏 でポストする';
}

function openXWithText(text) {
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text), '_blank', 'noopener,noreferrer');
}

function buildTweetText(d) {
  var lines = ['🌸 わたしのプロフ帳できたよ！', ''];
  lines.push('👤 名前：' + d.name);
  if (d.blood) lines.push(BLOOD_THEME[d.blood].emoji + ' 血液型：' + d.blood + '型');
  if (d.bday) {
    lines.push('🎂 誕生日：' + d.bday + ' 生まれ');
    lines.push(d.zodiac.emoji + ' 星座：' + d.zodiac.name + ' ' + d.zodiac.sym);
    lines.push(d.eto.emoji    + ' 干支：'  + d.eto.name);
    lines.push(d.gem.emoji    + ' 誕生石：' + d.gem.name);
    lines.push(d.flower.emoji + ' 誕生花：' + d.flower.name);
    lines.push(''); lines.push('💬 ' + d.combo);
  }
  lines.push('');
  lines.push('https://ogurana17.github.io/My-Profile/');
  lines.push('#プロフ帳 #MyProfile');
  return lines.join('\n');
}

function fallbackDownloadAndOpen(canvas, tweetText) {
  var a = document.createElement('a');
  a.download = 'my_profile.png'; a.href = canvas.toDataURL('image/png'); a.click();
  showToast('📥 画像を保存しました！Xに添付してね 💖');
  setTimeout(function() { openXWithText(tweetText); }, 800);
}

function postToX() {
  var d = window._postData;
  if (!d) { alert('先にプロフ帳を作ってね♪'); return; }

  var btn = document.getElementById('btn-tweet');
  btn.disabled = true;
  btn.innerHTML = X_SVG + ' 画像を準備中…';

  html2canvas(document.getElementById('output-card'), { scale:2, useCORS:true, backgroundColor:'#ffffff' })
    .then(function(canvas) {
      if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
        canvas.toBlob(function(blob) {
          navigator.clipboard.write([new ClipboardItem({'image/png': blob})])
            .then(function() {
              resetTweetBtn();
              showToast('📋 画像をコピーしました！Xに貼り付けてね 💖');
              setTimeout(function() { openXWithText(buildTweetText(d)); }, 600);
            })
            .catch(function() { resetTweetBtn(); fallbackDownloadAndOpen(canvas, buildTweetText(d)); });
        }, 'image/png');
      } else {
        resetTweetBtn(); fallbackDownloadAndOpen(canvas, buildTweetText(d));
      }
    })
    .catch(function() { resetTweetBtn(); openXWithText(buildTweetText(d)); });
}

// ── 画像保存 ──────────────────────────────────────────────────
function downloadCard() {
  html2canvas(document.getElementById('output-card'), { scale:2, useCORS:true, backgroundColor:'#ffffff' })
    .then(function(canvas) {
      var a = document.createElement('a');
      a.download = 'my_profile.png'; a.href = canvas.toDataURL('image/png'); a.click();
    });
}
</script>
