<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロフ帳 ★ My Profile</title>

<style>
@font-face {
  font-family: 'MPLUS1c';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('fonts/MPLUSRounded1c-Regular.ttf') format('truetype');
}
@font-face {
  font-family: 'MPLUS1c';
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url('fonts/MPLUSRounded1c-Bold.ttf') format('truetype');
}
@font-face {
  font-family: 'MPLUS1c';
  font-weight: 800;
  font-style: normal;
  font-display: swap;
  src: url('fonts/MPLUSRounded1c-ExtraBold.ttf') format('truetype');
}
@font-face {
  font-family: 'MPLUS1c';
  font-weight: 900;
  font-style: normal;
  font-display: swap;
  src: url('fonts/MPLUSRounded1c-Black.ttf') format('truetype');
}
@font-face {
  font-family: 'ZenMaru';
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url('fonts/ZenMaruGothic-Bold.ttf') format('truetype');
}
@font-face {
  font-family: 'Yomogi';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('fonts/Yomogi-Regular.ttf') format('truetype');
}
@font-face {
  font-family: 'KleeOne';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('fonts/KleeOne-Regular.ttf') format('truetype');
}
@font-face {
  font-family: 'KleeOne';
  font-weight: 600;
  font-style: normal;
  font-display: swap;
  src: url('fonts/KleeOne-SemiBold.ttf') format('truetype');
}
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg1: #ffb6d9;
  --bg2: #dda0f8;
  --bg3: #a0c8ff;
  --bg4: #ffd6a0;
  --np: #ff3dac;
  --npu: #c53dff;
  --nb: #3dc8ff;
  --ny: #ffe03d;
  --ng: #3dffb4;
  --glow-pink: 0 0 10px rgba(255,61,172,0.7), 0 0 20px rgba(255,61,172,0.4);
  --glow-purple: 0 0 10px rgba(197,61,255,0.7), 0 0 20px rgba(197,61,255,0.4);
  --glow-blue: 0 0 10px rgba(61,200,255,0.7), 0 0 20px rgba(61,200,255,0.4);
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 30%, var(--bg3) 65%, var(--bg4) 100%);
  background-attachment: fixed;
  font-family: 'KleeOne', 'MPLUS1c', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 16px 70px;
  position: relative;
  overflow-x: hidden;
}

/* ── 背景シンボル（回転） ── */
.bg-symbol {
  position: fixed;
  font-size: 220px;
  line-height: 1;
  opacity: 0.13;
  pointer-events: none;
  font-family: serif;
  font-weight: 900;
  color: transparent;
  -webkit-text-stroke: 3px rgba(255,61,172,0.6);
  animation: spin-slow 60s linear infinite;
  will-change: transform;
  z-index: 0;
}
.bg-symbol-2 {
  position: fixed;
  font-size: 130px;
  opacity: 0.14;
  pointer-events: none;
  color: transparent;
  -webkit-text-stroke: 2px rgba(61,200,255,0.6);
  animation: spin-slow 45s linear infinite reverse;
  will-change: transform;
  z-index: 0;
}
@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── フワフワ絵文字 ── */
.float-bg {
  position: fixed;
  pointer-events: none;
  animation: floaty 8s ease-in-out infinite;
  will-change: transform;
  z-index: 0;
  font-size: 140px;
  opacity: 0.5;
  filter: drop-shadow(0 0 16px rgba(255,61,172,0.7));
}
@keyframes floaty {
  0%,100% { transform: translateY(0px) rotate(-4deg); }
  50%     { transform: translateY(-18px) rotate(4deg); }
}

/* SVGデコ要素（クローバー・音符・羽） */
.deco-obj {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  animation: deco-float 7s ease-in-out infinite;
  will-change: transform;
  filter: drop-shadow(0 0 10px rgba(255,61,172,0.7));
}
@keyframes deco-float {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50%      { transform: translateY(-10px) rotate(4deg); }
}

/* ── ページタイトル ── */
.page-title {
  font-size: 32px;
  font-weight: 900;
  font-family: 'MPLUS1c', sans-serif;
  color: white;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 6px;
  text-shadow:
    0 0 10px rgba(255,100,200,0.9),
    0 0 22px rgba(200,100,255,0.7),
    0 0 40px rgba(255,61,172,0.5),
    2px 2px 0 rgba(160,0,100,0.4);
  position: relative; z-index: 1;
}
.page-sub {
  font-size: 12px;
  font-family: 'KleeOne', sans-serif;
  color: rgba(255,255,255,0.97);
  text-align: center;
  letter-spacing: 8px;
  margin-bottom: 28px;
  position: relative; z-index: 1;
  text-shadow: 0 0 10px rgba(255,150,220,0.8), 0 0 20px rgba(255,100,200,0.4);
}

/* ─── 入力カード（もやもやすりガラス） ─── */
.card {
  background: rgba(255,255,255,0.28);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border: 2px solid rgba(255,255,255,0.65);
  border-radius: 32px;
  padding: 28px 26px 34px;
  width: 100%;
  max-width: 520px;
  position: relative;
  z-index: 1;
  box-shadow:
    0 8px 40px rgba(200,80,140,0.28),
    0 0 0 1px rgba(255,180,230,0.25),
    0 2px 0 rgba(255,255,255,0.7) inset,
    0 0 60px rgba(197,61,255,0.08);
}
/* もやもや枠の光彩 */
.card::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 34px;
  background: linear-gradient(135deg,
    rgba(255,61,172,0.35) 0%,
    rgba(197,61,255,0.25) 30%,
    rgba(61,200,255,0.25) 60%,
    rgba(61,255,180,0.2) 100%);
  z-index: -1;
  filter: blur(4px);
  animation: border-glow 5s ease-in-out infinite;
}
@keyframes border-glow {
  0%,100% { opacity: 0.7; }
  50%      { opacity: 1; }
}

.form-section { display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }

/* ラベル：Yomogi + ネオングラデーション */
.field-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-family: 'KleeOne', 'MPLUS1c', sans-serif;
  font-weight: 400;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #ff3dac, #c53dff, #3dc8ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.field-input {
  background: rgba(255,255,255,0.68);
  border: 2px solid rgba(255,100,200,0.3);
  border-radius: 16px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: 'Yomogi', 'MPLUS1c', sans-serif;
  font-weight: 600;
  color: #5a0040;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  width: 100%;
}
.field-input:focus {
  border-color: #ff3dac;
  background: rgba(255,255,255,0.92);
  box-shadow: 0 0 0 3px rgba(255,61,172,0.18),
              0 0 14px rgba(255,61,172,0.2),
              0 0 28px rgba(197,61,255,0.1);
}
.field-input::placeholder { color: rgba(200,100,160,0.45); font-size: 12px; font-family: 'KleeOne', sans-serif; }
textarea.field-input { resize: vertical; min-height: 78px; line-height: 1.8; }

/* 血液型ボタン */
.blood-row { display: flex; gap: 8px; }
.blood-btn {
  flex: 1; padding: 9px 4px;
  border: 2px solid rgba(255,100,200,0.3);
  border-radius: 16px;
  background: rgba(255,255,255,0.68);
  font-family: 'Yomogi', 'MPLUS1c', sans-serif;
  font-size: 15px; font-weight: 600; color: #c0207a;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.blood-btn:hover { border-color: #ff3dac; background: rgba(255,230,245,0.88); box-shadow: 0 0 8px rgba(255,61,172,0.25); }
.blood-btn.selected {
  background: linear-gradient(135deg, #ff3dac, #c53dff);
  border-color: transparent; color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  box-shadow: 0 3px 12px rgba(200,61,255,0.45), 0 0 16px rgba(255,61,172,0.3);
}

/* 誕生日 */
.bday-row { display: flex; align-items: center; gap: 5px; }
.bday-inp {
  background: rgba(255,255,255,0.68);
  border: 2px solid rgba(255,100,200,0.3);
  border-radius: 16px; padding: 10px 6px;
  font-size: 15px; font-family: 'Yomogi', 'MPLUS1c', sans-serif;
  font-weight: 600; color: #5a0040;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  text-align: center; -webkit-appearance: none;
}
.bday-inp:focus {
  border-color: #ff3dac;
  box-shadow: 0 0 0 3px rgba(255,61,172,0.18), 0 0 12px rgba(255,61,172,0.18);
}
.bday-inp::placeholder { color: rgba(200,100,160,0.45); font-size: 11px; }
#f-bday-y { width: 76px; }
#f-bday-m { width: 52px; }
#f-bday-d { width: 52px; }
.bday-sep {
  font-size: 15px; color: #e020a0; font-weight: 900; flex-shrink: 0;
  font-family: 'MPLUS1c', sans-serif;
  text-shadow: 0 0 8px rgba(255,100,200,0.7), 0 0 16px rgba(255,61,172,0.4);
}
.bday-hint { font-size: 10px; color: rgba(150,50,100,0.7); margin-top: 3px; line-height: 1.5; font-family: 'KleeOne', sans-serif; }

/* divider */
.divider {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; margin: 8px 0 2px;
  font-family: 'KleeOne', 'MPLUS1c', sans-serif;
  font-weight: 400;
  background: linear-gradient(90deg, #ff3dac, #c53dff, #3dc8ff, #ff3dac);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 2px;
  border-radius: 2px;
  background: linear-gradient(to right, transparent, rgba(255,61,172,0.6), rgba(197,61,255,0.6));
}
.divider::after { background: linear-gradient(to left, transparent, rgba(61,200,255,0.6), rgba(197,61,255,0.6)); }

/* 生成ボタン */
.btn-generate {
  margin-top: 22px; width: 100%; padding: 16px;
  background: linear-gradient(135deg, #ff3dac 0%, #c53dff 50%, #3dc8ff 100%);
  color: white; border: none; border-radius: 50px;
  font-family: 'MPLUS1c', sans-serif;
  font-size: 16px; font-weight: 900; letter-spacing: 3px;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  box-shadow:
    0 4px 0 rgba(150,0,120,0.4),
    0 8px 24px rgba(200,61,255,0.45),
    0 0 24px rgba(255,61,172,0.35),
    0 0 48px rgba(61,200,255,0.2);
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  position: relative; overflow: hidden;
}
.btn-generate::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
  border-radius: 50px;
}
.btn-generate:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 0 rgba(150,0,120,0.4), 0 16px 36px rgba(200,61,255,0.55), 0 0 36px rgba(255,61,172,0.5), 0 0 60px rgba(61,200,255,0.25);
}
.btn-generate:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(150,0,120,0.4); }

/* ═══ OUTPUT ═══ */
#output-section {
  display: none; width: 100%; max-width: 520px; margin-top: 32px;
  position: relative; z-index: 1;
}

.output-card {
  border-radius: 28px;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.75);
  font-family: 'Yomogi', 'MPLUS1c', sans-serif;
  box-shadow:
    0 12px 40px rgba(180,60,140,0.3),
    0 0 0 1px rgba(255,180,230,0.2),
    0 0 60px rgba(197,61,255,0.12);
  position: relative;
}
/* もやもや枠グロー */
.output-card::before {
  content: '';
  position: absolute; inset: -4px;
  border-radius: 32px;
  background: linear-gradient(135deg,
    rgba(255,61,172,0.4) 0%,
    rgba(197,61,255,0.3) 30%,
    rgba(61,200,255,0.3) 65%,
    rgba(61,255,180,0.25) 100%);
  z-index: -1;
  filter: blur(4px);
  animation: border-glow 5s ease-in-out infinite;
}

.output-header {
  padding: 22px 24px 18px;
  position: relative;
  overflow: hidden;
  min-height: 185px;
}

/* 血液型バッジ */
.hdr-symbol-big {
  position: absolute; right: -5px; bottom: -15px;
  font-size: 155px; line-height: 1;
  color: transparent;
  -webkit-text-stroke: 2px rgba(255,255,255,0.28);
  font-family: serif; font-weight: 900;
  pointer-events: none; user-select: none;
  animation: sym-pulse 6s ease-in-out infinite;
}
@keyframes sym-pulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }

/* 右上：大きな星座動物絵文字 */
.hdr-zodiac-big {
  position: absolute;
  top: 10px; right: 14px;
  font-size: 72px;
  line-height: 1;
  z-index: 3;
  pointer-events: none;
  animation: gem-float 5s ease-in-out infinite;
  filter: drop-shadow(0 0 16px rgba(255,200,240,0.7));
}
.hdr-gem-deco {
  position: absolute; font-size: 28px; pointer-events: none;
  animation: gem-float 4s ease-in-out infinite;
  will-change: transform;
  filter: drop-shadow(0 0 14px rgba(255,200,240,0.6));
}
@keyframes gem-float {
  0%   { transform: translateY(0px)   rotate(-10deg) scale(1); }
  30%  { transform: translateY(-10px) rotate(5deg)   scale(1.12); }
  60%  { transform: translateY(-5px)  rotate(12deg)  scale(1.06); }
  100% { transform: translateY(0px)   rotate(-10deg) scale(1); }
}

.hdr-ticker {
  font-size: 10px; color: rgba(255,255,255,0.9);
  letter-spacing: 5px; margin-bottom: 12px;
  text-shadow: 0 0 8px rgba(255,200,240,0.9), 0 0 16px rgba(255,150,220,0.5);
  font-family: 'KleeOne', sans-serif;
}
.output-title {
  font-size: 21px; font-weight: 600; color: white;
  font-family: 'ZenMaru', 'MPLUS1c', sans-serif;
  text-shadow:
    1px 1px 0 rgba(0,0,0,0.12),
    0 0 16px rgba(255,200,240,0.9),
    0 0 32px rgba(255,150,220,0.6),
    0 0 48px rgba(197,61,255,0.3);
  letter-spacing: 3px; margin-bottom: 12px;
  position: relative; z-index: 2;
}
.zodiac-row {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  position: relative; z-index: 2;
}
.zodiac-badge {
  background: rgba(255,255,255,0.2);
  border: 1.5px solid rgba(255,255,255,0.72);
  border-radius: 20px; padding: 5px 13px;
  font-size: 11px; color: white; font-weight: 600;
  font-family: 'Yomogi', sans-serif;
  letter-spacing: 0.5px; white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,0.12);
  animation: badge-shimmer 4s ease-in-out infinite;
}
@keyframes badge-shimmer {
  0%,100% { background: rgba(255,255,255,0.2); box-shadow: none; }
  50%      { background: rgba(255,255,255,0.36); box-shadow: 0 0 10px rgba(255,255,255,0.35); }
}
.zodiac-badge.gem-badge {
  background: rgba(255,255,255,0.3);
  border-color: rgba(255,255,255,0.9); font-size: 12px;
}
.hdr-ticker-bot {
  font-size: 10px; color: rgba(255,255,255,0.9);
  letter-spacing: 5px; position: relative; z-index: 2;
  text-shadow: 0 0 8px rgba(255,200,240,0.9), 0 0 16px rgba(255,150,220,0.5);
  font-family: 'KleeOne', sans-serif;
}

/* ── ボディ（もやもやすりガラス） ── */
.output-body {
  background: rgba(255,248,255,0.86);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 22px 22px 24px;
  position: relative;
}

.body-pattern {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden; z-index: 0;
  opacity: 0.06; font-size: 28px;
  display: flex; flex-wrap: wrap; align-content: flex-start;
  gap: 18px; padding: 10px;
}

.out-name-block {
  text-align: center; margin-bottom: 18px; padding-bottom: 14px;
  border-bottom: 2px solid transparent;
  border-image: linear-gradient(90deg, #ff3dac, #c53dff, #3dc8ff, #3dffb4) 1;
  position: relative; z-index: 1;
}
/* 名前は変えない（KleeOneで統一のみ） */
.out-name {
  font-size: 28px; font-weight: 600;
  font-family: 'Yomogi', sans-serif;
  letter-spacing: 4px; color: #a01860;
  text-shadow: 0 1px 3px rgba(200,80,140,0.2),
               0 0 12px rgba(255,100,180,0.15);
}
.out-bday {
  font-size: 12px; margin-top: 4px; letter-spacing: 2px;
  font-family: 'Yomogi', sans-serif; font-weight: 400;
  background: linear-gradient(90deg,#ff3dac,#c53dff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.out-meta-row {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-top: 6px; flex-wrap: wrap;
}
.out-blood-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  font-family: 'Yomogi', sans-serif;
  border: 2px solid;
}

.out-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 12px; position: relative; z-index: 1;
}
.out-item {
  background: rgba(255,255,255,0.78);
  border-radius: 16px; padding: 10px 12px;
  position: relative; overflow: hidden;
  box-shadow: 0 2px 8px rgba(200,80,160,0.08);
}
.out-item::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(180deg, #ff3dac, #c53dff);
  border-radius: 16px 0 0 16px;
  box-shadow: 2px 0 8px rgba(255,61,172,0.3);
}
.out-item:nth-child(2n)::before {
  background: linear-gradient(180deg, #3dc8ff, #3dffb4);
  box-shadow: 2px 0 8px rgba(61,200,255,0.3);
}
.out-item:nth-child(2n) .out-key {
  background: linear-gradient(90deg, #3dc8ff, #3dffb4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.out-item:nth-child(2n) .out-val { color: #0060a0; }
.out-item:nth-child(3n)::before {
  background: linear-gradient(180deg, #ffe03d, #ff3dac);
  box-shadow: 2px 0 8px rgba(255,224,61,0.3);
}
.out-item:nth-child(3n) .out-key {
  background: linear-gradient(90deg, #f0a000, #ff3dac);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.out-item:nth-child(3n) .out-val { color: #a05000; }
.out-item.full { grid-column: 1 / -1; }
.out-item.full::before {
  background: linear-gradient(180deg, #ff3dac, #c53dff, #3dc8ff);
  box-shadow: 2px 0 8px rgba(197,61,255,0.3);
}

.out-key {
  font-size: 9px; font-weight: 600; font-family: 'KleeOne', sans-serif;
  letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase;
  background: linear-gradient(90deg, #ff3dac, #c53dff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; padding-left: 8px;
  filter: drop-shadow(0 0 3px rgba(255,61,172,0.4));
}
.out-val {
  font-size: 14px; line-height: 1.5;
  word-break: break-all; font-weight: 600;
  font-family: 'Yomogi', sans-serif; padding-left: 8px;
  color: #7a00a0;
}

.out-message-box {
  border-radius: 18px; padding: 14px 16px; margin-top: 4px;
  background: rgba(255,245,255,0.92);
  position: relative; z-index: 1;
  box-shadow: 0 0 0 2px rgba(197,61,255,0.28),
              0 0 16px rgba(197,61,255,0.12),
              inset 0 0 20px rgba(255,200,240,0.15);
}
.out-message-label {
  font-size: 10px; font-weight: 400; font-family: 'KleeOne', sans-serif;
  letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase;
  background: linear-gradient(90deg, #c53dff, #3dc8ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;

// ── グラデーション合成 ────────────────────────────────────────
function hex2rgba(hex, a) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function makeHeaderGrad(z, e, gem, fl, blood) {
  // 血液型カラーをアクセントに加える
  var bColor = blood ? BLOOD_THEME[blood].light : fl.sub;
  return 'linear-gradient(135deg, ' +
    z.grad[0] + ' 0%, ' + gem.light + ' 25%, ' +
    e.c + ' 52%, ' + bColor + ' 75%, ' + fl.sub + ' 100%)';
}
function makeBodyGrad(z, gem, blood) {
  var bLight = blood ? BLOOD_THEME[blood].light : gem.light;
  return 'linear-gradient(160deg, #fff 0%, ' +
    hex2rgba(bLight, 0.18) + ' 50%, ' +
    hex2rgba(z.grad[3], 0.22) + ' 100%)';
}
function makeBgGrad(z, e, gem, fl) {
  return 'linear-gradient(135deg, ' +
    hex2rgba(z.grad[0], 0.85) + ' 0%, ' +
    hex2rgba(gem.light, 0.9)  + ' 30%, ' +
    hex2rgba(e.c, 0.85)       + ' 60%, ' +
    hex2rgba(fl.sub, 0.9)     + ' 100%)';
}

// ── ボディパターン ────────────────────────────────────────────
function buildBodyPattern(z, gem, fl) {
  var emojis = [fl.emoji, gem.emoji, z.emoji, '✨', '💕', fl.emoji, '⭐', gem.emoji];
  var pat = document.getElementById('body-pattern');
  pat.innerHTML = '';
  for (var i = 0; i < 24; i++) pat.innerHTML += emojis[i%emojis.length] + ' ';
}

// ── ヘッダー構築 ──────────────────────────────────────────────
function buildHeader(name, z, e, gem, fl, combo, blood) {
  var hdr = document.getElementById('out-header');
  hdr.style.background = makeHeaderGrad(z, e, gem, fl, blood);
  hdr.innerHTML = [
    '<div class="hdr-symbol-big">'+z.sym+'</div>',
    '<div class="hdr-zodiac-big">'+z.emoji+'</div>',
    '<div class="hdr-gem-deco" style="top:76px;right:20px;font-size:26px;animation-delay:0.5s;">'+fl.emoji+'</div>',
    '<div class="hdr-gem-deco" style="top:76px;right:58px;font-size:22px;animation-delay:1.2s;">'+gem.emoji+'</div>',
    '<div class="hdr-ticker">💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕</div>',
    '<div class="output-title">'+name+' の プロフ 💖</div>',
    '<div class="zodiac-row" id="zodiac-row"></div>',
    '<div class="hdr-ticker-bot">💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕 ★ 💕</div>',
  ].join('');

  var badges = [
    z.emoji + '  ' + z.name + '  ' + z.sym,
    e.emoji + '  ' + e.name,
    gem.emoji + '  ' + gem.name,
    fl.emoji + '  ' + fl.name,
    combo,
  ];
  if (blood) badges.splice(2, 0, BLOOD_THEME[blood].emoji + '  ' + blood + '型');
  var row = hdr.querySelector('#zodiac-row');
  badges.forEach(function(txt, i) {
    var b = document.createElement('div');
    b.className = 'zodiac-badge' + (i >= 2 ? ' gem-badge' : '');
    b.textContent = txt;
    row.appendChild(b);
  });
}

    if (isNaN(year)||year<1900||year>2030) { alert('西暦を4桁で入力してね（例：2002）'); return; }
    if (isNaN(month)||month<1||month>12)   { alert('月を正しく入力してね（1〜12）'); return; }
    if (isNaN(day)||day<1||day>31)         { alert('日を正しく入力してね（1〜31）'); return; }

  var card = document.getElementById('output-card');

    document.getElementById('bg-sym-main').textContent = z.sym;
    document.getElementById('bg-sym-sub').textContent  = e.emoji;

      'linear-gradient(135deg, ' + hex2rgba(fl.sub,0.45) + ', ' + hex2rgba(bLight,0.45) + ')';
    document.getElementById('out-msgbox').style.borderColor = hex2rgba(gem.color, 0.3);

    card.style.boxShadow = '0 12px 40px ' + hex2rgba(z.grad[2], 0.3) + ', 0 4px 16px ' + hex2rgba(gem.color, 0.2);

    var footer = document.getElementById('out-footer');
    footer.style.background = 'linear-gradient(135deg,' + hex2rgba(z.grad[0],0.9) + ',' + hex2rgba(fl.sub,0.9) + ')';
    footer.style.color = 'white';

    card.style.boxShadow = '0 12px 40px rgba(200,80,160,0.2)';

  // グリッド
  var fields = [
    { key:'🎨 好きな色',    val: v('f-color'),     full: false },

    { key:'💕 理想のタイプ', val: v('f-type'),      full: true  },
  ];
  var grid = document.getElementById('out-grid');
  grid.innerHTML = '';
  fields.forEach(function(f) {
    var item = document.createElement('div');
    item.className = 'out-item' + (f.full ? ' full' : '');

  // Xポスト用データ
  window._postData = {
    name: name, blood: blood,
    bday: hasBday ? (month+'月'+day+'日') : null,
    zodiac: hasBday ? getZodiac(month,day) : null,
    eto:    hasBday ? getEto(year) : null,
    gem:    hasBday ? getGem(month) : null,
    flower: hasBday ? getFlower(month) : null,
    combo:  hasBday ? getComboMsg(ZODIAC.indexOf(getZodiac(month,day)), ETO.indexOf(getEto(year))) : null,
  };

  document.getElementById('output-section').style.display = 'block';
  setTimeout(function() {
    document.getElementById('output-section').scrollIntoView({ behavior:'smooth', block:'start' });
  }, 60);
}

function showToast(msg) {
  var t = document.getElementById('copy-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}

var X_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>';

function resetTweetBtn() {
  var btn = document.getElementById('btn-tweet');
  btn.disabled = false;
  btn.innerHTML = X_SVG + ' でポストする';
}

function openXWithText(text) {
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text), '_blank', 'noopener,noreferrer');
}

function buildTweetText(d) {
  var lines = ['🌸 わたしのプロフ帳できたよ！', ''];
  lines.push('👤 名前：' + d.name);
  if (d.blood) lines.push(BLOOD_THEME[d.blood].emoji + ' 血液型：' + d.blood + '型');
  if (d.bday) {
    lines.push('🎂 誕生日：' + d.bday + ' 生まれ');
    lines.push(d.zodiac.emoji + ' 星座：' + d.zodiac.name + ' ' + d.zodiac.sym);
    lines.push(d.eto.emoji    + ' 干支：'  + d.eto.name);
    lines.push(d.gem.emoji    + ' 誕生石：' + d.gem.name);
    lines.push(d.flower.emoji + ' 誕生花：' + d.flower.name);
    lines.push(''); lines.push('💬 ' + d.combo);
  }
  lines.push('');
  lines.push('https://ogurana17.github.io/My-Profile/');
  lines.push('#プロフ帳 #MyProfile');
  return lines.join('\n');
}

function fallbackDownloadAndOpen(canvas, tweetText) {
  saveImage(canvas);
  showToast('📥 画像を保存しました！Xに添付してね 💖');
  setTimeout(function() { openXWithText(tweetText); }, 800);
}

function postToX() {
  var d = window._postData;
  if (!d) { alert('先にプロフ帳を作ってね♪'); return; }

  var btn = document.getElementById('btn-tweet');
  btn.disabled = true;
  btn.innerHTML = X_SVG + ' 画像を準備中…';

  captureCard(function(canvas) {
    if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
      canvas.toBlob(function(blob) {
        navigator.clipboard.write([new ClipboardItem({'image/png': blob})])
          .then(function() {
            resetTweetBtn();
            showToast('📋 画像をコピーしました！Xに貼り付けてね 💖');
            setTimeout(function() { openXWithText(buildTweetText(d)); }, 600);
          })
          .catch(function() { resetTweetBtn(); fallbackDownloadAndOpen(canvas, buildTweetText(d)); });
      }, 'image/png');
    } else {
      resetTweetBtn(); fallbackDownloadAndOpen(canvas, buildTweetText(d));
    }
  });
}

// ── iOS判定 ──────────────────────────────────────────────────
function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

// ── 画像保存（iOS対応） ──────────────────────────────────────
// A5サイズ (300dpi): 1748×2480px
var A5_W = 1748, A5_H = 2480;

function captureCard(callback) {
  var card = document.getElementById('output-card');
  var opts = {
    width: card.scrollWidth,
    height: card.scrollHeight,
    pixelRatio: 3,
    backgroundColor: '#ffffff',
    filter: function(node) {
      return !(node.classList && node.classList.contains('body-pattern'));
    }
  };

  // iOS Safari/Chrome は foreignObject の初回レンダリングが不完全な場合があるため
  // toPng を2回呼ぶことで安定させる（既知の workaround）
  htmlToImage.toPng(card, opts)
    .then(function() {
      return htmlToImage.toPng(card, opts);
    })
    .then(function(dataUrl) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        canvas.width = A5_W;
        canvas.height = A5_H;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, A5_W, A5_H);
        var sc = Math.min(A5_W / img.width, A5_H / img.height);
        var w = img.width * sc, h = img.height * sc;
        ctx.drawImage(img, (A5_W - w) / 2, (A5_H - h) / 2, w, h);
        callback(canvas);
      };
      img.src = dataUrl;
    })
    .catch(function(err) {
      console.error('capture error:', err);
    });
}

function saveImage(canvas) {
  if (isIOS()) {
    // iOS: a.download が効かないため、Blob URLを新しいタブで開いて長押し保存を促す
    canvas.toBlob(function(blob) {
      var url = URL.createObjectURL(blob);
      var w = window.open(url, '_blank');
      if (!w) {
        // ポップアップブロック時はimg要素を表示
        var img = document.createElement('img');
        img.src = url;
        img.style.cssText = 'max-width:100%;position:fixed;top:0;left:0;z-index:99999;background:#fff;padding:16px;';
        var close = document.createElement('div');
        close.textContent = '✕ 閉じる';
        close.style.cssText = 'position:fixed;top:8px;right:12px;z-index:99999;background:#ff3dac;color:#fff;padding:8px 16px;border-radius:20px;font-weight:900;cursor:pointer;font-size:14px;';
        close.onclick = function() { img.remove(); close.remove(); };
        document.body.appendChild(img);
        document.body.appendChild(close);
      }
      showToast('📱 画像を長押しして保存してね 💖');
    }, 'image/png');
  } else {
    // PC/Android: a.download で通常ダウンロード
    var a = document.createElement('a');
    a.download = 'my_profile.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }
}

function downloadCard() {
  captureCard(function(canvas) {
    saveImage(canvas);
  });
}
